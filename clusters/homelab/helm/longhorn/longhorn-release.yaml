apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
  labels:
    tmp: label
spec:
  releaseName: longhorn
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.12"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  targetNamespace: longhorn-system
  install:
    createNamespace: true