apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  targetNamespace: kube-system
  releaseName: cilium
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: flux-system
  interval: 10m
  values: 
    k8sServiceHost: 192.168.1.186
    k8sServicePort: 6443
    operator:
      replicas: 1
    kubeProxyReplacement: true
