apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  targetNamespace: cilium
  releaseName: cilium
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: flux-system
  interval: 10m
  install:
    createNamespace: true
  values: 
    kubeProxyReplacement: true
    k8sServiceHost: 192.168.1.186
    k8sServicePort: 6443