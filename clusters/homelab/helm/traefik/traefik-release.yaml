apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  targetNamespace: kube-system
  releaseName: traefik
  chartRef:
    kind: OCIRepository
    name: traefik
    namespace: flux-system
  interval: 10m
  values:
    accessLog:
      enabled: true
      format: json

    providers:
      kubernetesIngress:
        enabled: true